<html>

<head>
<title>Metriq Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Metriq Dashboard</h1>

<h2>Calories</h2>
<canvas id="caloriesChart"></canvas>

<h2>Weight</h2>
<canvas id="weightChart"></canvas>

<script>

async function loadData() {

    const response = await fetch("/api/dashboard")
    const json = await response.json()

    console.log("dashboard data:", json)

    const rows = json.data || json.rows || []

    const dates = rows.map(d => d.date)
    const calories = rows.map(d => d.calories)
    const weight = rows.map(d => d.weight)

    new Chart(
        document.getElementById("caloriesChart"),
        {
            type: "line",
            data: {
                labels: dates,
                datasets: [{
                    label: "Calories",
                    data: calories
                }]
            }
        }
    )

    new Chart(
        document.getElementById("weightChart"),
        {
            type: "line",
            data: {
                labels: dates,
                datasets: [{
                    label: "Weight",
                    data: weight
                }]
            }
        }
    )

}

loadData()

</script>

</body>

</html>
